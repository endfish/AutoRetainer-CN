Enable==启用
This is purely visual order and does not affects character processing in any way.==这只会改变显示顺序，不会影响角色的实际处理顺序。
Delays==延迟
Time Desynchronization Compensation==时间不同步补偿
Additional amount of seconds that will be subtracted from venture ending time to help mitigate possible issues of time desynchronization between the game and your PC.==从探险结束时间中额外扣除的秒数，用于缓解游戏服务器与本机时间不同步可能造成的问题。
Additional Interaction Delay, frames==额外交互延迟（帧）
The lower this value is the faster plugin will use actions. When dealing with low FPS or high latency you may want to increase this value. If you want the plugin to operate faster you may decrease it.==数值越低，插件执行操作越快。帧率较低或网络延迟较高时可适当调高；希望插件运行更快时可适当调低。
Extra Logging==额外日志
This option enables excessive logging for debugging purposes. It will spam your log and cause performance issues while enabled. This option will disable itself upon plugin reload or game restart.==为调试启用大量额外日志。启用后会刷屏并可能影响性能；重载插件或重启游戏时会自动关闭。
Operation==运行模式
Assign + Reassign==派遣 + 再次派遣
Automatically assigns enabled retainers to a Quick Venture if they have none already in progress and reassigns current venture.==若已启用的雇员当前没有探险任务，则自动派遣其进行快速探险；已有任务时会再次派遣。
Collect==仅收取
Only collect venture rewards from the retainer, and will not reassign them.\nHold CTRL when interacting with the Summoning Bell to apply this mode temporarily.==只收取雇员的探险报酬，不会再次派遣。\n与传唤铃交互时按住 CTRL 可临时使用此模式。
Reassign==再次派遣
Only reassign ventures that retainers are undertaking.==只让雇员再次执行当前正在进行的探险。
RetainerSense==自动感应传唤铃
AutoRetainer will automatically enable itself when the player is within interaction range of a Summoning Bell. You must remain stationary or the activation will be cancelled.==玩家进入传唤铃的交互范围后，AutoRetainer 会自动启用。触发期间必须保持静止，否则会取消启用。
Activation Time==触发等待时间
