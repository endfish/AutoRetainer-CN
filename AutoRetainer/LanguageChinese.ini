5. If questioned by game master, always claim that you are doing all actions manually and never admit plugin usage.==5. 若被 GM 质询,一律声称所有操作皆为手动,绝不承认使用插件。
Failure to follow these guidelines may put your account at risk.==不遵守这些准则可能使你的帐号面临风险。
