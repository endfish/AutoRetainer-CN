Language==语言
Plugin display language==插件显示语言
Some texts are cached and will only update after the plugin is reloaded.==部分文本会被缓存，重载插件后才会全部更新。
Anonymise Retainers==隐藏雇员姓名
Retainer names will be redacted from general UI elements. They will not be hidden in debug menus and plugin logs however. While this option is on, character and retainer numbers are not guaranteed to be equal in different sections of a plugin (for example, retainer 1 in retainers view is not guaranteed to be the same retainer as in statistics view).==常规界面中的雇员姓名将被隐藏，但调试菜单与插件日志中仍会显示。启用后，插件不同页面里的角色与雇员编号不保证一一对应（例如，雇员页面中的“雇员 1”与统计页面中的“雇员 1”不一定是同一名雇员）。
Display Quick Menu in Retainer UI==在雇员界面显示快捷菜单
Display Extended Retainer Info==显示雇员扩展信息
Displays retainer item level/gathering/perception and the name of their current venture in the main UI.==在主界面中显示雇员的品级、获得力、鉴别力及当前探险名称。
Do not close AutoRetainer windows on ESC key press==按下 ESC 时不要关闭 AutoRetainer 窗口
Display only most significant icon in status bar==状态栏只显示最重要的图标
Status bar icon size==状态栏图标大小
Open AutoRetainer window on game start==游戏启动时打开 AutoRetainer 窗口
Enable title screen button (requires plugin restart)==启用标题画面按钮（需要重载插件）
Hide character search==隐藏角色搜索
Don't flash background of characters that are complete==角色任务完成时不闪烁背景
Do not warn about second game instance running from same directory==同一目录启动第二个游戏实例时不再警告
This will automatically skip AutoRetainer's loading on second instance of the game and you will have no way of loading it until you disable this option in primary instance==AutoRetainer 将在第二个游戏实例中自动跳过加载；在第一个实例中关闭此选项前，第二个实例无法再加载本插件。
