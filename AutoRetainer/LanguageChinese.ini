These items will always be discarded, regardless of their source, as long as their stack count does not exceeds specified amount that you can specify below. Discards occur very frequently, before and after each action that may alter inventory. Discard is always prioritized, even if same item is present in sell or desynthesis list, it will be discarded. Protected items won't be discarded. ==只要堆叠数量不超过下方指定值，这些物品无论来源都会被丢弃。插件会在可能改变背包的操作前后频繁检查丢弃。丢弃始终优先；即使同一物品也在出售或分解列表中，仍会被丢弃。受保护物品不会被丢弃。
